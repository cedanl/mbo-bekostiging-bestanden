# Veldschema voor RO (Registratieoverzicht)
# Gebaseerd op DUO PvE v4.8.3, Bijlage 7
# Veldnamen zijn PascalCase-versies van de officiële Nederlandse namen.
schema_version = "4.8.3"

[VLP]
single_row  = true
fields      = ["Recordsoort", "BRIN", "DatumBeginPeriode", "DatumEindePeriode", "DatumAanmaak"]
date_fields = ["DatumBeginPeriode", "DatumEindePeriode", "DatumAanmaak"]
int_fields  = []

[PER]
fields      = ["Recordsoort", "Burgerservicenummer", "Onderwijsnummer", "Geboortedatum", "Geslacht"]
date_fields = ["Geboortedatum"]
int_fields  = []

[ISG]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "Inschrijvingvolgnummer", "DatumInschrijving", "DatumUitschrijvingGepland",
    "DatumUitschrijvingWerkelijk", "RedenUitschrijving",
]
date_fields = ["DatumInschrijving", "DatumUitschrijvingGepland", "DatumUitschrijvingWerkelijk"]
int_fields  = []

[ISP]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "Inschrijvingvolgnummer", "DatumBegin", "Opleidingcode",
    "Leertraject", "Niveau", "IndicatieBekostigbaar",
    "LocatiecodeVSV", "Onderwijsaanbieder", "Onderwijslocatie",
    "Leerroute", "Leerroutefase",
]
date_fields = ["DatumBegin"]
int_fields  = []

[ISE]
fields      = ["Recordsoort", "Burgerservicenummer", "Onderwijsnummer", "Inschrijvingvolgnummer", "DatumBegin", "DatumEind"]
date_fields = ["DatumBegin", "DatumEind"]
int_fields  = []

[BPV]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "Inschrijvingvolgnummer", "Volgnummer", "Afsluitdatum",
    "DatumBegin", "DatumEindGepland", "DatumEindWerkelijk",
    "Omvang", "LeerbedrijfID", "Opleidingcode", "CodeKeuzedeel",
]
date_fields = ["Afsluitdatum", "DatumBegin", "DatumEindGepland", "DatumEindWerkelijk"]
int_fields  = []

[DIP]
# Positie 7 ontbreekt in PvE v4.8.3 maar is aanwezig in alle bekende leveringen (altijd leeg).
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "Resultaatvolgnummer", "Opleidingcode", "DatumResultaat",
    "_onbekend", "IndicatieBekostigbaar", "Inschrijvingvolgnummer",
    "Onderwijsaanbieder",
]
date_fields = ["DatumResultaat"]
int_fields  = []

[AMO]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "ResultaatvolgnummerDiploma", "OpleidingcodeDiploma",
    "Resultaatvolgnummer", "CodeAMvBOnderdeel", "DatumResultaat",
    "Certificaat", "Inschrijvingvolgnummer", "Onderwijsaanbieder",
]
date_fields = ["DatumResultaat"]
int_fields  = []

[GEO]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "ResultaatvolgnummerDiploma", "OpleidingcodeDiploma",
    "Resultaatvolgnummer", "CodeGeneriekExamenonderdeel", "DatumResultaat",
    "Eindcijfer", "VrijstellingGeneriekExamenonderdeel",
    "CijferIE", "VrijstellingIE", "CijferCE", "VrijstellingCE",
    "Inschrijvingvolgnummer", "Onderwijsaanbieder",
]
date_fields = ["DatumResultaat"]
int_fields  = ["Eindcijfer", "CijferIE", "CijferCE"]

[KZD]
fields = [
    "Recordsoort", "Burgerservicenummer", "Onderwijsnummer",
    "ResultaatvolgnummerDiploma", "OpleidingcodeDiploma",
    "Resultaatvolgnummer", "CodeKeuzedeel", "DatumResultaat",
    "Resultaat", "Certificaat", "Inschrijvingvolgnummer", "Onderwijsaanbieder",
]
date_fields = ["DatumResultaat"]
int_fields  = []

[SLR]
single_row  = true
fields = [
    "Recordsoort", "AantalPER", "AantalISG", "AantalISP",
    "AantalISE", "AantalBPV", "AantalDIP", "AantalAMO",
    "AantalGEO", "AantalKZD",
]
date_fields = []
int_fields  = ["AantalPER", "AantalISG", "AantalISP", "AantalISE", "AantalBPV", "AantalDIP", "AantalAMO", "AantalGEO", "AantalKZD"]
